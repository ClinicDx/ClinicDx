# =============================================================================
# ClinicDx V1 — Docker Compose (GPU profile, default)
# =============================================================================
# Usage:
#   GPU:  make up   (docker compose --profile gpu up -d)
#   CPU:  make up-cpu
#
# Startup order (health-gated): kb → model → middleware → nginx
#
# GGUFs and KB index are bind-mounted from the existing host paths so
# first-start is instant — no re-download needed.
# =============================================================================

name: clinicdx-v1

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:

  # ── Knowledge Base Daemon ───────────────────────────────────────────────────
  kb:
    build:
      context: .
      dockerfile: docker/kb/Dockerfile
    image: clinicdx-v1/kb:latest
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "200m"
        max-file: "10"
    volumes:
      # Source index (read-only) — entrypoint copies to writable /kb_work
      - /var/www/kbToolUseLora/kb:/kb_data:ro
      # Writable working copy for memvid_sdk (persisted across restarts)
      - kb_work:/kb_work
      # EmbedGemma 300M weights — bind-mounted from host HF cache (read-only)
      - /home/brook_avionuas/.cache/huggingface:/hf_cache:ro
    environment:
      KB_PORT: "4276"
      KB_SEARCH_MODE: "${KB_SEARCH_MODE:-rrf}"
      KB_K: "${KB_K:-5}"
      KB_SNIPPET_CHARS: "${KB_SNIPPET_CHARS:-15000}"
      KB_THRESHOLD: "0.0"
      KB_DATA_DIR: "/kb_data"
      KB_INDEX_PATH: "/kb_data/who_knowledge_vec_v2.mv2"
      EMBED_MODEL_PATH: "/hf_cache/hub/models--google--embeddinggemma-300m/snapshots/57c266a740f537b4dc058e1b0cda161fd15afa75"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    networks:
      - clinicdx-internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4276/health"]
      interval: 15s
      timeout: 5s
      start_period: 60s
      retries: 5

  # ── Model Server (llama-server, GPU) ────────────────────────────────────────
  model:
    build:
      context: .
      dockerfile: docker/model/Dockerfile.gpu
    image: clinicdx-v1/model-gpu:latest
    profiles: ["gpu"]
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8180:8180"
    volumes:
      # Bind-mount existing GGUFs — no re-download, instant start
      - /var/www/unified_llama/gguf:/gguf_data:ro
    environment:
      MODEL_PORT: "8180"
      N_GPU_LAYERS: "${N_GPU_LAYERS:-999}"
      MODEL_CTX: "${MODEL_CTX:-8192}"
      MODEL_PARALLEL: "${MODEL_PARALLEL:-1}"
      MODEL_THREADS: "${MODEL_THREADS:-8}"
      GGUF_DIR: "/gguf_data"
      HF_MODEL_REPO: "${HF_MODEL_REPO:-ClinicDx1/ClinicDx}"
      HF_TOKEN: "${HF_TOKEN:-}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - clinicdx-internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8180/health"]
      interval: 20s
      timeout: 10s
      start_period: 60s
      retries: 5

  # ── FastAPI Middleware ───────────────────────────────────────────────────────
  middleware:
    build:
      context: .
      dockerfile: docker/middleware/Dockerfile
    image: clinicdx-v1/middleware:latest
    restart: unless-stopped
    logging: *default-logging
    environment:
      MODEL_SERVER_URL: "http://model:8180"
      KB_URL: "http://kb:4276"
      OPENMRS_URL: "${OPENMRS_URL:-https://172.18.0.1/openmrs}"
      OPENMRS_USER: "${OPENMRS_USER:-admin}"
      OPENMRS_PASSWORD: "${OPENMRS_PASSWORD:-Admin123}"
      MIDDLEWARE_PORT: "8080"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    depends_on:
      kb:
        condition: service_healthy
      model:
        condition: service_healthy
    networks:
      - clinicdx-internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5

  # ── nginx reverse proxy ──────────────────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    image: clinicdx-v1/nginx:latest
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "${SSL_CERT_PATH:-./certs/server.crt}:/etc/nginx/certs/server.crt:ro"
      - "${SSL_KEY_PATH:-./certs/server.key}:/etc/nginx/certs/server.key:ro"
    depends_on:
      middleware:
        condition: service_healthy
    networks:
      - clinicdx-internal
    healthcheck:
      test: ["CMD", "curl", "-sfk", "https://localhost/clinicdx-api/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  kb_work:
    driver: local

networks:
  clinicdx-internal:
    driver: bridge
